<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScanWarehouse — Pick</title>
    <link rel="icon" href="ScanIcon.png" type="image/png">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="pick-layout">
        <!-- Header -->
        <header class="pick-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="background:#fff; border-radius:6px; padding:4px 8px; display:flex; align-items:center;">
                    <img src="Logo.png" alt="Logo" style="height:36px; display:block;">
                </div>
                <h1 style="margin:0;">Pick (เบิก)</h1>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="user-badge" id="pickUserBadge">-</span>
                <button onclick="logout()"
                    style="background:#fff; color:#dc2626; border:2px solid #fff; border-radius:8px; padding:6px 12px; font-size:13px; font-weight:600; cursor:pointer;">🚪
                    ออก</button>
            </div>
        </header>

        <!-- Body -->
        <div class="pick-body">
            <!-- SO Input -->
            <div class="glass-card scan-section">
                <div class="form-group" style="margin-bottom:0;">
                    <label style="font-size:14px; font-weight:600; color:var(--text-primary);">📋 Sales Order
                        (SO)</label>
                    <input type="text" id="soInput" placeholder="กรอกเลข SO" style="font-size:16px; padding:14px 16px;">
                </div>
            </div>

            <!-- Model & Part No -->
            <div class="glass-card scan-section">
                <div class="form-group" style="margin-bottom:12px;">
                    <label style="font-size:14px; font-weight:600; color:var(--text-primary);">📦 Model</label>
                    <div style="display:flex; gap:6px; align-items:center;">
                        <input type="text" id="modelInput" placeholder="กรอก Model"
                            style="font-size:16px; padding:14px 16px; flex:1;">
                        <button type="button" class="lock-btn" id="lockModel" onclick="toggleLock('Model')"
                            title="ล็อค/ปลดล็อค">
                            🔓
                        </button>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label style="font-size:14px; font-weight:600; color:var(--text-primary);">🔧 Part No.</label>
                    <div style="display:flex; gap:6px; align-items:center;">
                        <input type="text" id="partNoInput" placeholder="กรอก Part No."
                            style="font-size:16px; padding:14px 16px; flex:1;">
                        <button type="button" class="lock-btn" id="lockPartNo" onclick="toggleLock('PartNo')"
                            title="ล็อค/ปลดล็อค">
                            🔓
                        </button>
                    </div>
                </div>
            </div>

            <!-- Scan Serial -->
            <div class="glass-card scan-section">
                <label
                    style="font-size:14px; font-weight:600; color:var(--text-primary); display:block; margin-bottom:8px;">📷
                    สแกน Serial</label>
                <div class="serial-input">
                    <input type="text" id="serialInput" placeholder="สแกนหรือพิมพ์ Serial...">
                </div>
                <div style="display:flex; gap:8px; margin-top:10px;">
                    <button type="button" id="submitPickBtn" onclick="submitPick()"
                        style="flex:1; padding:14px; font-size:16px; font-weight:700; background:var(--gradient-primary); color:#fff; border:none; border-radius:8px; cursor:pointer; box-shadow:0 3px 10px rgba(220,38,38,0.3);">
                        📤 บันทึกเบิก
                    </button>
                    <button type="button" onclick="clearAll()"
                        style="padding:14px 20px; font-size:16px; font-weight:700; background:#f5f6fa; color:#dc2626; border:2px solid #dc2626; border-radius:8px; cursor:pointer;">
                        🗑️ เคลียร์
                    </button>
                </div>
            </div>

            <!-- Results -->
            <div id="pickResults" class="pick-result">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">📷</div>
                    <p>สแกน Serial เพื่อเริ่มเบิกสินค้า</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Modal (for serial not found) -->
    <div class="modal-overlay" id="confirmPickModal">
        <div class="modal" style="max-width:400px;">
            <div class="confirm-dialog">
                <div class="confirm-icon">⚠️</div>
                <h3>ไม่พบ Serial ในระบบ</h3>
                <p id="confirmPickMessage">Serial ไม่มีในระบบ คุณต้องการเบิกหรือไม่?</p>
                <div style="font-size:12px; color:var(--text-muted); margin-bottom:20px;">
                    หากยืนยัน จะบันทึกเป็นสถานะ <span class="badge badge-fail">Fail</span>
                </div>
                <div class="confirm-actions">
                    <button class="btn btn-outline" onclick="cancelForcePick()">❌ ยกเลิก</button>
                    <button class="btn btn-danger" onclick="submitForcePick()">⚠️ ยืนยันเบิก</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/auth.js"></script>
    <script>
        let currentUser = null;
        let pendingForceSerial = '';
        const lockedFields = { So: false, Model: false, PartNo: false };

        function clearAll() {
            document.getElementById('soInput').value = '';
            document.getElementById('modelInput').value = '';
            document.getElementById('partNoInput').value = '';
            document.getElementById('serialInput').value = '';
            document.getElementById('soInput').focus();
        }

        function toggleLock(field) {
            lockedFields[field] = !lockedFields[field];
            const btn = document.getElementById('lock' + field);
            const inputMap = { So: 'soInput', Model: 'modelInput', PartNo: 'partNoInput' };
            const input = document.getElementById(inputMap[field]);

            if (lockedFields[field]) {
                btn.textContent = '🔒';
                btn.classList.add('locked');
                input.style.background = '#fff3f3';
                input.style.borderColor = '#dc2626';
            } else {
                btn.textContent = '🔓';
                btn.classList.remove('locked');
                input.style.background = '';
                input.style.borderColor = '';
            }
        }

        function clearUnlockedFields() {
            if (!lockedFields.Model) document.getElementById('modelInput').value = '';
            if (!lockedFields.PartNo) document.getElementById('partNoInput').value = '';
        }
        let pickResults = [];

        // ===== Helpers =====
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ===== Init =====
        (async () => {
            currentUser = await requireAuth(['warehouse', 'admin', 'sale_admin']);
            if (!currentUser) return;

            document.getElementById('pickUserBadge').textContent = currentUser.full_name;

            // Focus serial input
            document.getElementById('serialInput').focus();
        })();

        // ===== Scan Handler =====
        async function submitPick() {
            const serialEl = document.getElementById('serialInput');
            const serial = serialEl.value.trim();
            const so = document.getElementById('soInput').value.trim();
            const model = document.getElementById('modelInput').value.trim();
            const partNo = document.getElementById('partNoInput').value.trim();

            if (!so) {
                showToast('กรุณาระบุเลข SO ก่อน', 'warning');
                document.getElementById('soInput').focus();
                return;
            }
            if (!serial) {
                showToast('กรุณาสแกนหรือกรอก Serial', 'warning');
                serialEl.focus();
                return;
            }

            serialEl.value = '';
            serialEl.disabled = true;
            document.getElementById('submitPickBtn').disabled = true;

            try {
                const data = await apiCall('pick.php', 'POST', { so, serial, model, part_no: partNo });

                if (data.status === 'not_found') {
                    pendingForceSerial = serial;
                    document.getElementById('confirmPickMessage').textContent = data.message;
                    document.getElementById('confirmPickModal').classList.add('active');
                } else {
                    addResult(data);
                    showToast(data.message, data.status === 'Pass' ? 'success' : 'warning');
                    clearUnlockedFields();
                }
            } catch (err) {
                showToast(err.message, 'error');
            }

            serialEl.disabled = false;
            document.getElementById('submitPickBtn').disabled = false;
            serialEl.focus();
        }


        // ===== Force Pick (Fail) =====
        async function submitForcePick() {
            const so = document.getElementById('soInput').value.trim();
            const model = document.getElementById('modelInput').value.trim();
            const partNo = document.getElementById('partNoInput').value.trim();
            document.getElementById('confirmPickModal').classList.remove('active');

            try {
                const data = await apiCall('pick.php', 'POST', {
                    so,
                    serial: pendingForceSerial,
                    model,
                    part_no: partNo,
                    force: true,
                });
                addResult(data);
                showToast(data.message, 'warning');
            } catch (err) {
                showToast(err.message, 'error');
            }

            pendingForceSerial = '';
            clearUnlockedFields();
            document.getElementById('serialInput').focus();
        }

        function cancelForcePick() {
            document.getElementById('confirmPickModal').classList.remove('active');
            pendingForceSerial = '';
            document.getElementById('serialInput').focus();
        }

        // ===== Render Results =====
        function addResult(data) {
            pickResults.unshift(data);
            renderResults();
        }

        function renderResults() {
            const container = document.getElementById('pickResults');
            const emptyState = document.getElementById('emptyState');

            if (pickResults.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            const html = pickResults.map(r => `
                <div class="pick-result-card" style="display:flex; align-items:flex-start; margin-bottom:12px;">
                    <div class="result-status ${r.status.toLowerCase()}" style="margin-top:2px;">
                        ${r.status === 'Pass' ? '✅' : '❌'}
                    </div>
                    <div class="result-info" style="flex:1; padding:0 8px;">
                        <div style="font-size:12px; color:var(--text-muted); margin-bottom:2px;">SO: <span style="color:var(--text-primary); font-weight:600;">${escapeHtml(r.so)}</span></div>
                        <div class="result-serial" style="font-family:monospace; font-size:15px; font-weight:700; color:var(--primary-dark); margin-bottom:4px;">${escapeHtml(r.serial)}</div>
                        <div style="font-size:13px; color:var(--text-primary); line-height:1.3;">
                            <span style="font-weight:600;">Model:</span> ${escapeHtml(r.model || '-')}
                        </div>
                        <div style="font-size:13px; color:var(--text-primary); line-height:1.3;">
                            <span style="font-weight:600;">Part No:</span> ${escapeHtml(r.part_no || '-')}
                        </div>
                    </div>
                    <span class="result-badge ${r.status.toLowerCase()}" style="margin-top:2px;">${r.status}</span>
                </div>
            `).join('');

            // Keep empty state but hidden, render results before it
            container.innerHTML = html + '<div class="empty-state" id="emptyState" style="display:none;"><div class="empty-icon">📷</div><p>สแกน Serial เพื่อเริ่มเบิกสินค้า</p></div>';
        }

        // Keep focus on serial input
        document.addEventListener('click', (e) => {
            if (e.target.id !== 'soInput' && e.target.id !== 'modelInput' && e.target.id !== 'partNoInput' && !e.target.closest('.modal-overlay') && !e.target.closest('button')) {
                setTimeout(() => document.getElementById('serialInput')?.focus(), 100);
            }
        });
    </script>
</body>

</html>
