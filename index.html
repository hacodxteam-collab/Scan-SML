<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanWarehouse — Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <img src="Logo.png" alt="Logo"
                    style="width:280px; max-width:90%; margin-bottom:0px; border-radius:8px;">
                <h1><span style="-webkit-text-fill-color:initial;">📦</span> ScanWarehouse</h1>
                <p>ระบบสแกนรับ-เบิกสินค้า</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="กรอก Username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="กรอก Password" autocomplete="current-password"
                        required>
                </div>
                <div id="loginError"
                    style="color: var(--accent-red); font-size: 13px; margin-bottom: 12px; display: none;"></div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
                    เข้าสู่ระบบ
                </button>
            </form>

            <div style="text-align: center; margin-top: 24px;">
                <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px;">Demo Login</p>
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn btn-outline" style="flex:1; font-size:13px;"
                        onclick="demoLogin('admin','admin123')">
                        🖥️ Admin Sale
                    </button>
                    <button type="button" class="btn btn-outline" style="flex:1; font-size:13px;"
                        onclick="demoLogin('warehouse','wh123')">
                        📱 Warehouse
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/auth.js"></script>
    <script>
        // Check if already logged in
        checkSession().then(user => {
            if (user) {
                if (user.role === 'admin' || user.role === 'sale_admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'pick.html';
                }
            }
        });

        // Demo login — auto-fill and submit
        function demoLogin(user, pass) {
            document.getElementById('username').value = user;
            document.getElementById('password').value = pass;
            document.getElementById('loginForm').dispatchEvent(new Event('submit', { cancelable: true }));
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('loginError');
            errEl.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> กำลังเข้าสู่ระบบ...';

            try {
                const res = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'login',
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value,
                    }),
                });
                const data = await res.json();

                if (!res.ok) {
                    errEl.textContent = data.error || 'Login failed';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'เข้าสู่ระบบ';
                    return;
                }

                // Redirect based on role
                if (data.user.role === 'admin' || data.user.role === 'sale_admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'pick.html';
                }
            } catch (err) {
                errEl.textContent = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'เข้าสู่ระบบ';
            }
        });
    </script>
</body>

</html>
